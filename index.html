<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saira — Job Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--s1:#141414;--s2:#1c1c1c;--s3:#242424;--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--tx:#f0ede8;--mu:#888882;--dm:#3a3a38;--ac:#c8f060;--red:#ff6b6b;--blu:#74b9ff;--amb:#fdcb6e;--pur:#c084fc;--tel:#55efc4}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(200,240,96,0.03) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 10% 90%,rgba(116,185,255,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{max-width:1100px;margin:0 auto;padding:0 1.5rem;position:relative;z-index:1}

/* HEADER */
header{padding:2.5rem 0 1.5rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;border-bottom:1px solid var(--b1);margin-bottom:2rem}
.title-block h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,4vw,3rem);line-height:1.05;letter-spacing:-0.02em}
.title-block h1 em{color:var(--ac);font-style:italic}
.title-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);letter-spacing:.04em;margin-top:4px}
.sync-pill{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b2);border-radius:99px;padding:5px 12px 5px 9px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mu)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:breathe 2.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.2}}

/* SUMMARY METRICS */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--dm);border-radius:12px;overflow:hidden;border:1px solid var(--b1);margin-bottom:1.5rem}
.metric{background:var(--s1);padding:1.1rem 1rem;cursor:default;transition:background .15s;position:relative}
.metric::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--bc,transparent)}
.metric:hover{background:var(--s2)}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);font-weight:600;margin-bottom:.5rem}
.metric-num{font-family:'DM Serif Display',serif;font-size:2.4rem;line-height:1;color:var(--nc,var(--tx))}
.metric-foot{font-family:'DM Mono',monospace;font-size:10px;color:var(--dm);margin-top:2px}

/* MONTH TABS */
.month-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.25rem}
.m-btn{background:var(--s2);border:1px solid var(--b1);border-radius:99px;padding:6px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;transition:all .15s;white-space:nowrap}
.m-btn:hover{color:var(--tx);background:var(--s3)}
.m-btn.on{background:var(--ac);color:#0c0c0c;border-color:var(--ac)}
.m-btn .m-count{font-family:'DM Mono',monospace;font-size:10px;margin-left:4px;opacity:.7}

/* STATUS FILTER PILLS */
.status-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.status-nav-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-right:4px}
.s-btn{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b1);border-radius:99px;padding:5px 12px;font-family:'Syne',sans-serif;font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;transition:all .15s;white-space:nowrap}
.s-btn::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--dot,var(--mu));flex-shrink:0}
.s-btn:hover{color:var(--tx);background:var(--s3)}
.s-btn.on{border-color:var(--dot,var(--mu));color:var(--tx);background:var(--s3)}
.s-btn.on-solid{background:var(--dot);color:#0c0c0c;border-color:var(--dot)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:14px;pointer-events:none}
#searchBox{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 12px 8px 30px;font-family:'Syne',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .15s}
#searchBox:focus{border-color:var(--ac)}
#searchBox::placeholder{color:var(--dm)}

/* TABLE */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.tbl-inner{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);padding:10px 14px;border-bottom:1px solid var(--b1);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--tx)}
thead th.sorted{color:var(--ac)}
tbody tr{border-bottom:1px solid var(--b1);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
td{padding:10px 14px;font-size:12px;vertical-align:middle}
.td-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);white-space:nowrap}
.td-co{font-weight:600;white-space:nowrap}
.td-role{color:var(--mu);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-src{font-family:'DM Mono',monospace;font-size:10px;color:var(--dm);white-space:nowrap}
.td-status{white-space:nowrap}
.td-actions{white-space:nowrap}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.03em;border:1px solid transparent}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-noreply{background:rgba(116,185,255,.08);color:var(--blu);border-color:rgba(116,185,255,.2)}.b-noreply::before{background:var(--blu)}
.b-rejected{background:rgba(255,107,107,.08);color:var(--red);border-color:rgba(255,107,107,.2)}.b-rejected::before{background:var(--red)}
.b-received{background:rgba(200,240,96,.08);color:var(--ac);border-color:rgba(200,240,96,.2)}.b-received::before{background:var(--ac)}
.b-followup{background:rgba(253,203,110,.08);color:var(--amb);border-color:rgba(253,203,110,.2)}.b-followup::before{background:var(--amb)}
.b-interview{background:rgba(192,132,252,.08);color:var(--pur);border-color:rgba(192,132,252,.2)}.b-interview::before{background:var(--pur)}

/* EDIT BUTTON */
.edit-btn{background:none;border:1px solid var(--b2);border-radius:6px;padding:3px 8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);cursor:pointer;transition:all .15s}
.edit-btn:hover{border-color:var(--ac);color:var(--ac)}

/* TABLE FOOTER */
.tbl-foot{padding:8px 14px;border-top:1px solid var(--b1);font-family:'DM Mono',monospace;font-size:11px;color:var(--dm);display:flex;justify-content:space-between;align-items:center}

/* MONTH SUMMARY BAR */
.month-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.ms-item{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:.75rem 1rem;text-align:center}
.ms-num{font-family:'DM Serif Display',serif;font-size:1.8rem;line-height:1;color:var(--nc,var(--tx))}
.ms-label{font-size:10px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:1.5rem;width:min(480px,90vw);max-height:80vh;overflow-y:auto}
.modal h3{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:1rem}
.modal label{display:block;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;margin-top:.75rem}
.modal select,.modal input,.modal textarea{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;font-family:'Syne',sans-serif;font-size:13px;color:var(--tx);outline:none}
.modal select:focus,.modal input:focus,.modal textarea:focus{border-color:var(--ac)}
.modal textarea{resize:vertical;min-height:70px}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.btn-primary{background:var(--ac);color:#0c0c0c;border:none;border-radius:8px;padding:8px 18px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-secondary{background:var(--s2);color:var(--mu);border:1px solid var(--b2);border-radius:8px;padding:8px 18px;font-family:'Syne',sans-serif;font-size:12px;cursor:pointer}

/* ADD BUTTON */
.add-btn{display:inline-flex;align-items:center;gap:6px;background:var(--ac);color:#0c0c0c;border:none;border-radius:99px;padding:7px 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.add-btn:hover{opacity:.85}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--dm);font-family:'DM Mono',monospace;font-size:12px}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dm);border-radius:3px}

/* FOOTER */
footer{border-top:1px solid var(--b1);padding:1.5rem 0 2.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-note{font-family:'DM Mono',monospace;font-size:11px;color:var(--dm)}
.footer-note a{color:var(--mu);text-decoration:none}
.footer-note a:hover{color:var(--ac)}

@media(max-width:650px){.metrics{grid-template-columns:repeat(3,1fr)}.month-summary{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

<div class="wrap">

<header>
  <div class="title-block">
    <h1>Job <em>Tracker</em></h1>
    <div class="title-sub">SAIRA PRAGYAN · JAN 2026 → PRESENT</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
    <div class="sync-pill"><span class="pulse"></span><span id="syncLabel">synced today</span></div>
    <button class="add-btn" onclick="openAddModal()">+ Add application</button>
  </div>
</header>

<!-- OVERALL METRICS -->
<div class="metrics" id="metricsBar"></div>

<!-- MONTH TABS -->
<div class="month-nav" id="monthNav"></div>

<!-- MONTH SUMMARY -->
<div class="month-summary" id="monthSummary"></div>

<!-- STATUS FILTERS -->
<div class="status-nav">
  <span class="status-nav-label">Status</span>
  <button class="s-btn on" style="--dot:var(--tx)" onclick="setStatus('all',this)">All</button>
  <button class="s-btn" style="--dot:var(--blu)" onclick="setStatus('noreply',this)">No Reply</button>
  <button class="s-btn" style="--dot:var(--ac)" onclick="setStatus('received',this)">Response Received</button>
  <button class="s-btn" style="--dot:var(--red)" onclick="setStatus('rejected',this)">Rejected</button>
  <button class="s-btn" style="--dot:var(--amb)" onclick="setStatus('followup',this)">Follow Up</button>
  <button class="s-btn" style="--dot:var(--pur)" onclick="setStatus('interview',this)">Interview</button>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <input id="searchBox" type="text" placeholder="Search company or role…" oninput="render()">
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div class="tbl-inner">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('date')">Date <span id="sort-date"></span></th>
          <th onclick="sortBy('company')">Company <span id="sort-company"></span></th>
          <th>Role</th>
          <th>Source</th>
          <th>Status</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="tbl-foot">
    <span id="countLabel">—</span>
    <span id="lastUpdated" style="color:var(--dm)">—</span>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-note">Updated manually · <a href="https://github.com/SairaPM10/job-tracker" target="_blank">github.com/SairaPM10/job-tracker</a></div>
  <div class="footer-note">Jan 2026 → present</div>
</footer>

</div><!-- /wrap -->

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle">Add Application</h3>
    <input type="hidden" id="editId">
    <label>Date</label>
    <input type="date" id="f-date">
    <label>Company</label>
    <input type="text" id="f-company" placeholder="e.g. Goldman Sachs">
    <label>Role</label>
    <input type="text" id="f-role" placeholder="e.g. Business Analyst">
    <label>Source</label>
    <select id="f-source">
      <option>LinkedIn</option><option>Workday</option><option>Direct</option>
      <option>Greenhouse</option><option>Lever</option><option>SmartRecruiters</option>
      <option>Indeed</option><option>Glassdoor</option><option>Recruiter</option><option>Other</option>
    </select>
    <label>Status</label>
    <select id="f-status">
      <option value="noreply">No Reply</option>
      <option value="received">Response Received</option>
      <option value="rejected">Rejected</option>
      <option value="followup">Follow Up</option>
      <option value="interview">Interview</option>
    </select>
    <label>Notes (optional)</label>
    <textarea id="f-notes" placeholder="e.g. 2nd round scheduled, waiting to hear back…"></textarea>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

let nextId = 91;

const STATUS_META = {
  noreply:   {label:"No Reply",   cls:"b-noreply",   color:"var(--blu)"},
  received:  {label:"Response Received",  cls:"b-received",  color:"var(--ac)"},
  rejected:  {label:"Rejected",   cls:"b-rejected",  color:"var(--red)"},
  followup:  {label:"Follow Up",  cls:"b-followup",  color:"var(--amb)"},
  interview: {label:"Interview",  cls:"b-interview", color:"var(--pur)"},
};

let activeMonth = 'all';
let activeStatus = 'all';
let sortField = 'date';
let sortDir = -1;

// ── MONTHS ────────────────────────────────────────────────────────────────────
function getMonths() {
  const months = {};
  APPS.forEach(a => {
    const m = a.date.slice(0,7);
    months[m] = (months[m]||0)+1;
  });
  return Object.keys(months).sort().reverse();
}

function monthLabel(ym) {
  const [y,m] = ym.split('-');
  return new Date(y,m-1,1).toLocaleString('en-GB',{month:'short',year:'2-digit'});
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filtered() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  return APPS
    .filter(a => activeMonth==='all' || a.date.startsWith(activeMonth))
    .filter(a => activeStatus==='all' || a.status===activeStatus)
    .filter(a => !q || a.company.toLowerCase().includes(q) || a.role.toLowerCase().includes(q))
    .sort((a,b) => {
      let av = a[sortField]||'', bv = b[sortField]||'';
      return av < bv ? sortDir : av > bv ? -sortDir : 0;
    });
}

// ── RENDER METRICS ────────────────────────────────────────────────────────────
function renderMetrics() {
  const c = {total:0,noreply:0,received:0,rejected:0,followup:0,interview:0};
  APPS.forEach(a=>{c.total++;c[a.status]++});
  document.getElementById('metricsBar').innerHTML = `
    <div class="metric" style="--bc:var(--tx)">
      <div class="metric-label">Total Applied</div>
      <div class="metric-num">${c.total}</div>
      <div class="metric-foot">since Jan 2026</div>
    </div>
    <div class="metric" style="--bc:var(--red);--nc:var(--red)">
      <div class="metric-label">Rejected</div>
      <div class="metric-num">${c.rejected}</div>
      <div class="metric-foot">${Math.round(c.rejected/c.total*100)}% of total</div>
    </div>
    <div class="metric" style="--bc:var(--ac);--nc:var(--ac)">
      <div class="metric-label">Response Received</div>
      <div class="metric-num">${c.received}</div>
      <div class="metric-foot">any reply</div>
    </div>
    <div class="metric" style="--bc:var(--blu);--nc:var(--blu)">
      <div class="metric-label">No Reply</div>
      <div class="metric-num">${c.noreply}</div>
      <div class="metric-foot">awaiting</div>
    </div>
    <div class="metric" style="--bc:var(--amb);--nc:var(--amb)">
      <div class="metric-label">Follow Up</div>
      <div class="metric-num">${c.followup+c.interview}</div>
      <div class="metric-foot">in progress</div>
    </div>`;
}

// ── RENDER MONTH TABS ─────────────────────────────────────────────────────────
function renderMonthNav() {
  const months = getMonths();
  const nav = document.getElementById('monthNav');
  const counts = {};
  APPS.forEach(a => { const m = a.date.slice(0,7); counts[m]=(counts[m]||0)+1; });
  nav.innerHTML = `<button class="m-btn ${activeMonth==='all'?'on':''}" onclick="setMonth('all',this)">All months</button>`
    + months.map(m=>`<button class="m-btn ${activeMonth===m?'on':''}" onclick="setMonth('${m}',this)">${monthLabel(m)}<span class="m-count">${counts[m]}</span></button>`).join('');
}

// ── RENDER MONTH SUMMARY ──────────────────────────────────────────────────────
function renderMonthSummary() {
  const pool = activeMonth==='all' ? APPS : APPS.filter(a=>a.date.startsWith(activeMonth));
  const c = {total:pool.length,noreply:0,received:0,rejected:0,followup:0,interview:0};
  pool.forEach(a=>c[a.status]++);
  document.getElementById('monthSummary').innerHTML = `
    <div class="ms-item"><div class="ms-num">${c.total}</div><div class="ms-label">Applied</div></div>
    <div class="ms-item"><div class="ms-num" style="color:var(--red)">${c.rejected}</div><div class="ms-label">Rejected</div></div>
    <div class="ms-item"><div class="ms-num" style="color:var(--ac)">${c.received}</div><div class="ms-label">Response</div></div>
    <div class="ms-item"><div class="ms-num" style="color:var(--blu)">${c.noreply}</div><div class="ms-label">No Reply</div></div>
    <div class="ms-item"><div class="ms-num" style="color:var(--amb)">${c.followup+c.interview}</div><div class="ms-label">Follow Up</div></div>`;
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable() {
  const data = filtered();
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty">no applications match this filter</div></td></tr>';
  } else {
    tbody.innerHTML = data.map(r=>{
      const sm = STATUS_META[r.status];
      return `<tr>
        <td class="td-date">${fmtDate(r.date)}</td>
        <td class="td-co">${r.company}</td>
        <td class="td-role" title="${r.role}">${r.role}</td>
        <td class="td-src">${r.source}</td>
        <td class="td-status"><span class="badge ${sm.cls}">${sm.label}</span></td>
        <td style="color:var(--mu);font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.notes||'—'}</td>
        <td class="td-actions"><button class="edit-btn" onclick="openEdit(${r.id})">edit</button></td>
      </tr>`;
    }).join('');
  }
  document.getElementById('countLabel').textContent = `${data.length} of ${APPS.length} applications`;
  // Sort indicators
  ['date','company'].forEach(f=>{
    const el = document.getElementById('sort-'+f);
    if(el) el.textContent = sortField===f ? (sortDir===-1?'↓':'↑') : '';
  });
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
}

// ── FULL RENDER ───────────────────────────────────────────────────────────────
function render() {
  renderMetrics();
  renderMonthNav();
  renderMonthSummary();
  renderTable();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function setMonth(m, btn) {
  activeMonth = m;
  render();
}

function setStatus(s, btn) {
  activeStatus = s;
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on','on-solid'));
  btn.classList.add('on');
  render();
}

function sortBy(field) {
  if(sortField===field) sortDir*=-1;
  else { sortField=field; sortDir=-1; }
  renderTable();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Add Application';
  document.getElementById('editId').value = '';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-company').value = '';
  document.getElementById('f-role').value = '';
  document.getElementById('f-source').value = 'LinkedIn';
  document.getElementById('f-status').value = 'noreply';
  document.getElementById('f-notes').value = '';
  document.getElementById('modalBg').classList.add('open');
}

function openEdit(id) {
  const a = APPS.find(x=>x.id===id);
  if(!a) return;
  document.getElementById('modalTitle').textContent = 'Edit Application';
  document.getElementById('editId').value = id;
  document.getElementById('f-date').value = a.date;
  document.getElementById('f-company').value = a.company;
  document.getElementById('f-role').value = a.role;
  document.getElementById('f-source').value = a.source;
  document.getElementById('f-status').value = a.status;
  document.getElementById('f-notes').value = a.notes||'';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if(!e || e.target===document.getElementById('modalBg'))
    document.getElementById('modalBg').classList.remove('open');
}

function saveEntry() {
  const id = document.getElementById('editId').value;
  const entry = {
    date: document.getElementById('f-date').value,
    company: document.getElementById('f-company').value.trim(),
    role: document.getElementById('f-role').value.trim()||'(role unspecified)',
    source: document.getElementById('f-source').value,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
  };
  if(!entry.company || !entry.date) return alert('Date and company are required');
  if(id) {
    const idx = APPS.findIndex(x=>x.id===parseInt(id));
    if(idx>-1) APPS[idx] = {...APPS[idx],...entry};
  } else {
    APPS.unshift({id:nextId++,...entry});
  }
  document.getElementById('modalBg').classList.remove('open');
  render();
}

document.getElementById('syncLabel').textContent = 'synced '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
render();
</script>
